name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Build static export
        run: |
          # Remove directories that cause build errors
          rm -rf src/app/api        # API routes incompatible with static export
          rm -rf examples           # Example files import missing deps (socket.io-client)
          rm -rf mini-services      # Not needed for static deployment
          rm -rf upload             # User uploads, not part of the app
          rm -rf scripts            # Build scripts, not part of the app

          # Replace next.config.ts with static export config
          rm -f next.config.ts
          cat > next.config.mjs << 'CONFIGEOF'
/** @type {import('next').NextConfig} */
const nextConfig = {
  output: 'export',
  basePath: '/promptc-os-ai-prompt-wiki',
  trailingSlash: true,
};
export default nextConfig;
CONFIGEOF

          # Build
          DEPLOY_TARGET=vercel npx next build
        env:
          DEPLOY_TARGET: vercel

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
