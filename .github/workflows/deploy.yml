name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Build static export
        run: |
          # Remove API routes (incompatible with static export)
          # The 21st.dev live search won't work on GitHub Pages, but all other content will
          rm -rf src/app/api

          # Create static export config (replaces next.config.ts)
          mv next.config.ts next.config.ts.bak
          cat > next.config.mjs << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'export',
            images: { unoptimized: true },
            basePath: '/promptc-os-ai-prompt-wiki',
            trailingSlash: true,
          };
          export default nextConfig;
          EOF

          # Build
          DEPLOY_TARGET=vercel npx next build
        env:
          DEPLOY_TARGET: vercel

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
